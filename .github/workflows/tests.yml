name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_COLOR: 1

jobs:
  linuxNode22:
    name: '[Linux] Node 22: Lint, Formatting, Unit & packaging tests'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 30

      - name: Retrieve last main commit (for `git diff` purposes)
        run: |
          git checkout -b pr
          git fetch --prune --depth=30 origin +refs/heads/main:refs/remotes/origin/main
          git checkout main
          git checkout pr

      - name: Restore npm cache
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-no-lock-v1-${{ runner.os }}-node22-${{ hashFiles('package.json') }}
          restore-keys: |
            npm-no-lock-v1-${{ runner.os }}-node22-

      - name: Install Node.js and npm
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --package-lock=false

      - name: Validate formatting
        run: npm run prettier-check:updated

      - name: Validate lint rules
        run: npm run lint:updated

      - name: Unit tests
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Packed install smoke test
        run: node ./scripts/ci/pack-smoke.js

  windowsNode22:
    name: '[Windows] Node 22: Unit tests'
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore npm cache
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-no-lock-v1-${{ runner.os }}-node22-${{ hashFiles('package.json') }}
          restore-keys: |
            npm-no-lock-v1-${{ runner.os }}-node22-

      - name: Install Node.js and npm
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --package-lock=false

      - name: Unit tests
        run: npm test

  linuxNode20:
    name: '[Linux] Node 20: Unit tests'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore npm cache
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-no-lock-v1-${{ runner.os }}-node20-${{ hashFiles('package.json') }}
          restore-keys: |
            npm-no-lock-v1-${{ runner.os }}-node20-

      - name: Install Node.js and npm
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --package-lock=false

      - name: Unit tests
        run: npm test
